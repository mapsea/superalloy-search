<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Search Logic Tests</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    .pass { color: #0f7f7a; }
    .fail { color: #b94c35; }
  </style>
</head>
<body>
  <h1>Search Logic Tests</h1>
  <pre id="output"></pre>
  <script type="module">
    import { overlapsRange, matchesAlloy, filterAlloys } from "../src/search.js";

    const output = document.querySelector("#output");
    const lines = [];

    function test(name, fn) {
      try {
        fn();
        lines.push(`PASS ${name}`);
      } catch (error) {
        lines.push(`FAIL ${name}: ${error.message}`);
      }
    }

    function assertEqual(actual, expected) {
      if (actual !== expected) {
        throw new Error(`expected ${expected}, got ${actual}`);
      }
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    const alloy718 = {
      name: "Inconel 718",
      aliases: ["Alloy 718", "UNS N07718"],
      family: "Ni基",
      elements: {
        Ni: { min: 50, max: 55, display: "50-55" },
        Fe: { kind: "balance", display: "Bal." },
        C: { max: 0.08, display: "0.08 max" }
      },
      sources: [{ type: "official" }]
    };

    test("range overlap matches intersecting ranges", () => {
      assertEqual(overlapsRange({ min: 50, max: 55 }, { min: 54, max: 60 }), true);
    });

    test("range overlap rejects non-intersecting ranges", () => {
      assertEqual(overlapsRange({ min: 50, max: 55 }, { min: 56, max: 60 }), false);
    });

    test("max-only value can match low range", () => {
      assertEqual(overlapsRange({ max: 0.08 }, { min: 0, max: 0.1 }), true);
    });

    test("balance value matches element presence", () => {
      assertEqual(overlapsRange({ kind: "balance" }, { min: 0, max: 100 }), true);
    });

    test("alloy name query matches aliases", () => {
      assertEqual(matchesAlloy(alloy718, { query: "N07718", elementFilters: [], sourceTypes: ["official"] }), true);
    });

    test("alloy text query matches usage", () => {
      const alloy = {
        name: "Example Alloy",
        aliases: [],
        category: "チタン合金",
        usage: "医療インプラント",
        elements: {},
        sources: [{ type: "official" }]
      };
      assert(matchesAlloy(alloy, { query: "インプラント" }), "usage should be searchable");
    });

    test("active language query matches localized usage", () => {
      const alloy = {
        name: "Example Alloy",
        aliases: [],
        category: "スーパーアロイ",
        usage: "熱処理炉",
        elements: {},
        sources: [{ type: "official" }],
        localized: {
          ja: {
            name: "Example Alloy",
            category: "スーパーアロイ",
            family: "スーパーアロイ",
            usage: "熱処理炉",
            properties: "高温環境向け合金。"
          },
          en: {
            name: "Example Alloy",
            category: "Superalloy",
            family: "Superalloy",
            usage: "heat-treatment furnaces",
            properties: "Alloy for high-temperature environments."
          },
          zh: {
            name: "Example Alloy",
            category: "高温合金",
            family: "高温合金",
            usage: "热处理炉",
            properties: "面向高温环境的合金。"
          }
        }
      };

      assert(matchesAlloy(alloy, { query: "heat-treatment", language: "en" }), "English usage should be searchable");
      assert(matchesAlloy(alloy, { query: "热处理", language: "zh" }), "Chinese usage should be searchable");
    });

    test("Japanese fallback query still works in another active language", () => {
      const alloy = {
        name: "Example Alloy",
        aliases: [],
        category: "スーパーアロイ",
        usage: "熱処理炉",
        elements: {},
        sources: [{ type: "official" }],
        localized: {
          ja: {
            name: "Example Alloy",
            category: "スーパーアロイ",
            family: "スーパーアロイ",
            usage: "熱処理炉",
            properties: "高温環境向け合金。"
          },
          en: {
            name: "Example Alloy",
            category: "Superalloy",
            family: "Superalloy",
            usage: "heat-treatment furnaces",
            properties: "Alloy for high-temperature environments."
          }
        }
      };

      assert(matchesAlloy(alloy, { query: "熱処理", language: "en" }), "Japanese fallback should remain searchable");
    });

    test("alloy text query matches category", () => {
      const alloy = {
        name: "Example Alloy",
        aliases: [],
        category: "工具鋼",
        usage: "金型",
        elements: {},
        sources: [{ type: "standard" }]
      };
      assert(matchesAlloy(alloy, { query: "工具鋼" }), "category should be searchable");
    });

    test("source type filter accepts standard sources", () => {
      const alloy = {
        name: "Example Alloy",
        aliases: [],
        category: "耐熱鋼",
        usage: "ボイラー",
        elements: {},
        sources: [{ type: "standard" }]
      };
      assert(matchesAlloy(alloy, { sourceTypes: ["standard"] }), "standard source should match");
    });

    test("source type filter rejects unmatched source type", () => {
      assertEqual(matchesAlloy(alloy718, { query: "", elementFilters: [], sourceTypes: ["reference"] }), false);
    });

    test("element filter matches overlapping composition", () => {
      assertEqual(matchesAlloy(alloy718, {
        query: "",
        sourceTypes: ["official"],
        elementFilters: [{ symbol: "Ni", min: 40, max: 52 }]
      }), true);
    });

    test("element filter rejects reversed user ranges", () => {
      assertEqual(matchesAlloy(alloy718, {
        query: "",
        sourceTypes: ["official"],
        elementFilters: [{ symbol: "Ni", min: 60, max: 40 }]
      }), false);
    });

    test("element filter rejects user ranges outside 0 to 100", () => {
      assertEqual(matchesAlloy(alloy718, {
        query: "",
        sourceTypes: ["official"],
        elementFilters: [{ symbol: "Ni", min: -10, max: 55 }]
      }), false);
      assertEqual(matchesAlloy(alloy718, {
        query: "",
        sourceTypes: ["official"],
        elementFilters: [{ symbol: "Ni", min: 50, max: 120 }]
      }), false);
    });

    test("element filter rejects non-numeric user ranges", () => {
      assertEqual(matchesAlloy(alloy718, {
        query: "",
        sourceTypes: ["official"],
        elementFilters: [{ symbol: "Ni", min: "", max: 55 }]
      }), false);
      assertEqual(matchesAlloy(alloy718, {
        query: "",
        sourceTypes: ["official"],
        elementFilters: [{ symbol: "Ni", min: 50, max: "abc" }]
      }), false);
    });

    test("estimated numeric value matches element range filter", () => {
      const alloy = {
        name: "Estimated Balance Example",
        aliases: [],
        category: "耐熱鋼",
        usage: "検証用",
        elements: {
          Fe: { min: 68.5, max: 68.5, unit: "wt%", display: "約68.5", estimated: true, estimateMethod: "balance midpoint estimate" }
        },
        sources: [{ type: "reference" }]
      };

      assertEqual(matchesAlloy(alloy, {
        query: "",
        sourceTypes: ["reference"],
        elementFilters: [{ symbol: "Fe", min: 68, max: 69 }]
      }), true);
    });

    test("filterAlloys returns matching alloys", () => {
      const result = filterAlloys([alloy718], {
        query: "718",
        sourceTypes: ["official"],
        elementFilters: [{ symbol: "Ni", min: 50, max: 55 }]
      });
      assertEqual(result.length, 1);
    });

    output.textContent = lines.join("\n");
    output.className = lines.some((line) => line.startsWith("FAIL")) ? "fail" : "pass";
  </script>
</body>
</html>
