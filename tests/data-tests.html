<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Alloy Data Tests</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; }
    .pass { color: #0f7f7a; }
    .fail { color: #b94c35; }
  </style>
</head>
<body>
  <h1>Alloy Data Tests</h1>
  <pre id="output"></pre>
  <script type="module">
    import { alloys, ELEMENT_COLUMNS, SOURCE_LABELS } from "../src/data/alloys.js";

    const output = document.querySelector("#output");
    const lines = [];

    const TARGET_IDS = [
      "inconel-600",
      "inconel-601",
      "inconel-617",
      "inconel-625",
      "inconel-690",
      "inconel-718",
      "inconel-x-750",
      "hastelloy-b-2",
      "hastelloy-c-22",
      "hastelloy-c-276",
      "haynes-188",
      "haynes-230",
      "haynes-282",
      "waspaloy",
      "nimonic-75",
      "nimonic-80a",
      "nimonic-90",
      "udimet-500",
      "udimet-520",
      "rene-41"
    ];

    const VALID_SOURCE_TYPES = ["official", "standard", "reference", "unverified"];

    function test(name, fn) {
      try {
        fn();
        lines.push(`PASS ${name}`);
      } catch (error) {
        lines.push(`FAIL ${name}: ${error.message}`);
      }
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message);
    }

    function assertArrayEqual(actual, expected, label) {
      const actualText = JSON.stringify(actual);
      const expectedText = JSON.stringify(expected);
      assert(actualText === expectedText, `${label}: expected ${expectedText}, got ${actualText}`);
    }

    test("exports expected constants", () => {
      assertArrayEqual(ELEMENT_COLUMNS, ["Ni", "Cr", "Co", "Fe", "Mo", "Nb", "Ti", "Al", "W", "Ta", "C", "Mn", "Si", "Cu", "V", "Sn", "Zr", "B", "P", "S", "N", "O", "H", "Pd", "Ru", "Be", "Hf"], "ELEMENT_COLUMNS");
      assert(SOURCE_LABELS.official === "公式", "official label missing");
      assert(SOURCE_LABELS.standard === "規格", "standard label missing");
      assert(SOURCE_LABELS.reference === "参考", "reference label missing");
      assert(SOURCE_LABELS.unverified === "未確認", "unverified label missing");
    });

    test("keeps original 20 target alloy ids and allows expansion", () => {
      const ids = alloys.map((alloy) => alloy.id);
      TARGET_IDS.forEach((id) => assert(ids.includes(id), `${id} missing`));
      assert(alloys.length > TARGET_IDS.length, `expected more than ${TARGET_IDS.length} records, got ${alloys.length}`);
    });

    test("contains exactly 300 alloy records", () => {
      assert(alloys.length === 300, `expected 300 records, got ${alloys.length}`);
    });

    test("has no duplicate ids", () => {
      const ids = alloys.map((alloy) => alloy.id);
      assert(new Set(ids).size === ids.length, "duplicate alloy id found");
    });

    test("all alloys have required top-level fields", () => {
      alloys.forEach((alloy) => {
        assert(typeof alloy.id === "string" && alloy.id.length > 0, `${alloy.name || "unknown"} id missing`);
        assert(typeof alloy.name === "string" && alloy.name.length > 0, `${alloy.id} name missing`);
        assert(Array.isArray(alloy.aliases), `${alloy.id} aliases must be an array`);
        assert(typeof alloy.family === "string" && alloy.family.length > 0, `${alloy.id} family missing`);
        assert(typeof alloy.category === "string" && alloy.category.length > 0, `${alloy.id} category missing`);
        assert(typeof alloy.usage === "string" && alloy.usage.length > 0, `${alloy.id} usage missing`);
        assert(alloy.elements && typeof alloy.elements === "object", `${alloy.id} elements missing`);
        assert(Array.isArray(alloy.sources) && alloy.sources.length > 0, `${alloy.id} sources missing`);
      });
    });

    test("all element entries have display and unit or balance kind", () => {
      alloys.forEach((alloy) => {
        Object.entries(alloy.elements).forEach(([symbol, value]) => {
          assert(typeof value.display === "string" && value.display.length > 0, `${alloy.id}.${symbol} display missing`);
          assert(value.kind === "balance" || value.unit === "wt%", `${alloy.id}.${symbol} unit/kind invalid`);
          assert(
            value.kind === "balance" ||
            typeof value.min === "number" ||
            typeof value.max === "number",
            `${alloy.id}.${symbol} needs min, max, or balance`
          );
        });
      });
    });

    test("estimated element entries are marked and documented", () => {
      const estimatedEntries = alloys.flatMap((alloy) =>
        Object.entries(alloy.elements)
          .filter(([, value]) => value.estimated)
          .map(([symbol, value]) => ({ alloy, symbol, value }))
      );

      assert(estimatedEntries.length > 0, "at least one estimated balance value should exist");
      estimatedEntries.forEach(({ alloy, symbol, value }) => {
        assert(value.unit === "wt%", `${alloy.id}.${symbol} estimated value must use wt%`);
        assert(typeof value.display === "string" && value.display.startsWith("約"), `${alloy.id}.${symbol} estimated display must start with 約`);
        assert(typeof value.estimateMethod === "string" && value.estimateMethod.length > 0, `${alloy.id}.${symbol} estimate method missing`);
        assert(value.kind !== "balance", `${alloy.id}.${symbol} estimated value must not remain balance kind`);
      });
    });

    test("generated data includes display-ready estimated balance markers", () => {
      const alloy = alloys.find((item) =>
        Object.values(item.elements).some((value) => value.estimated)
      );
      assert(Boolean(alloy), "estimated alloy missing");
    });

    test("all sources have required fields and valid source types", () => {
      alloys.forEach((alloy) => {
        alloy.sources.forEach((source, index) => {
          assert(VALID_SOURCE_TYPES.includes(source.type), `${alloy.id}.sources[${index}] invalid type`);
          assert(typeof source.company === "string" && source.company.length > 0, `${alloy.id}.sources[${index}] company missing`);
          assert(typeof source.title === "string" && source.title.length > 0, `${alloy.id}.sources[${index}] title missing`);
          assert(typeof source.url === "string" && /^https?:\/\//.test(source.url), `${alloy.id}.sources[${index}] url invalid`);
          assert(typeof source.checkedAt === "string" && /^\d{4}-\d{2}-\d{2}$/.test(source.checkedAt), `${alloy.id}.sources[${index}] checkedAt must be an ISO date`);
          assert(typeof source.notes === "string" && source.notes.length > 0, `${alloy.id}.sources[${index}] notes missing`);
        });
      });
    });

    test("contains broad steel-grade coverage", () => {
      const categoryCounts = alloys.reduce((counts, alloy) => {
        counts[alloy.category] = (counts[alloy.category] || 0) + 1;
        return counts;
      }, {});

      const totalFor = (patterns) => Object.entries(categoryCounts)
        .filter(([category]) => patterns.some((pattern) => category.includes(pattern)))
        .reduce((sum, [, count]) => sum + count, 0);

      assert(totalFor(["炭素鋼", "普通鋼"]) >= 35, "carbon/plain steel coverage too small");
      assert(totalFor(["合金鋼", "機械構造用鋼", "低合金鋼"]) >= 45, "low-alloy steel coverage too small");
      assert(totalFor(["ステンレス鋼", "二相ステンレス鋼", "析出硬化ステンレス鋼"]) >= 55, "stainless steel coverage too small");
      assert(totalFor(["工具鋼", "高速度工具鋼"]) >= 40, "tool steel coverage too small");
      assert(totalFor(["軸受鋼", "ばね鋼", "耐摩耗鋼"]) >= 25, "bearing/spring/wear steel coverage too small");
      assert(totalFor(["耐熱鋼", "耐候性鋼", "電磁鋼"]) >= 25, "heat/weathering/electrical steel coverage too small");
    });

    output.textContent = lines.join("\n");
    output.className = lines.some((line) => line.startsWith("FAIL")) ? "fail" : "pass";
  </script>
</body>
</html>
