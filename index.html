<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>スーパーアロイ成分検索</title>
  <link rel="stylesheet" href="src/styles.css?v=20260614k">
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow" data-i18n="siteEyebrow">Superalloy Composition Finder</p>
      <h1 data-i18n="siteTitle">スーパーアロイ成分検索</h1>
      <p class="lead" data-i18n="siteLead">合金名、元素、成分レンジから特殊金属・スーパーアロイを比較できます。</p>
    </div>
    <div class="language-switcher">
      <button id="languageToggle" class="language-toggle" type="button" aria-label="表示言語" aria-haspopup="true" aria-expanded="false">
        <svg class="language-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3 12h18"></path>
          <path d="M12 3c2.4 2.5 3.6 5.5 3.6 9s-1.2 6.5-3.6 9"></path>
          <path d="M12 3c-2.4 2.5-3.6 5.5-3.6 9s1.2 6.5 3.6 9"></path>
        </svg>
      </button>
      <div id="languageMenu" class="language-menu" hidden>
        <button type="button" data-language-option="ja">JP</button>
        <button type="button" data-language-option="zh">CH</button>
        <button type="button" data-language-option="en">EN</button>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <section class="filters" aria-label="検索条件" data-i18n-aria-label="filtersAriaLabel">
      <label class="search-field">
        <span data-i18n="searchLabel">合金名・別名</span>
        <input id="queryInput" type="search" placeholder="例: Inconel 718, UNS N07718" data-i18n-placeholder="searchPlaceholder">
      </label>

      <div class="filter-row">
        <label>
          <span data-i18n="elementLabel">元素</span>
          <select id="elementSelect"></select>
        </label>
        <button id="addElementFilter" type="button" data-i18n="addElementFilter">元素条件を追加</button>
      </div>

      <div id="elementFilters" class="element-filters"></div>

    </section>

    <section class="results" aria-live="polite">
      <div class="results-header">
        <h2 data-i18n="resultsHeading">比較結果</h2>
        <p id="resultCount">0件</p>
      </div>
      <div class="table-wrap">
        <table class="comparison-table">
          <thead>
            <tr id="tableHead"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="cardResults" class="card-results"></div>
    </section>
  </main>

  <dialog id="alloyDialog" class="alloy-dialog">
    <button id="closeDialog" class="dialog-close" type="button" aria-label="閉じる">×</button>
    <div id="dialogContent"></div>
  </dialog>

  <script type="module" src="src/app.js?v=20260614k"></script>
</body>
</html>
